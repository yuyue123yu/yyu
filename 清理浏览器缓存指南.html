<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清理 Super Admin 缓存</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe5e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ea580c 0%, #dc2626 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #6b7280;
            font-size: 16px;
        }
        
        .status {
            background: #fef3c7;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status.success {
            background: #d1fae5;
            border-color: #10b981;
        }
        
        .status-text {
            font-size: 18px;
            font-weight: 600;
            color: #92400e;
        }
        
        .status.success .status-text {
            color: #065f46;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ea580c 0%, #dc2626 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(234, 88, 12, 0.3);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .info-box {
            background: #eff6ff;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .info-title {
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .info-list {
            list-style: none;
            color: #1e40af;
        }
        
        .info-list li {
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
        }
        
        .info-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            font-weight: bold;
        }
        
        .warning {
            background: #fef2f2;
            border: 2px solid #ef4444;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .warning-text {
            color: #991b1b;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .links {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .link-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            text-decoration: none;
            color: #374151;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
        }
        
        .link-btn:hover {
            border-color: #ea580c;
            color: #ea580c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🧹</div>
            <h1>清理 Super Admin 缓存</h1>
            <p class="subtitle">解决登录问题的第一步</p>
        </div>
        
        <div class="status" id="status">
            <div class="status-text" id="statusText">准备清理缓存...</div>
        </div>
        
        <div class="info-box">
            <div class="info-title">将要清理的内容：</div>
            <ul class="info-list">
                <li>Local Storage 数据</li>
                <li>Session Storage 数据</li>
                <li>所有 Cookies</li>
                <li>IndexedDB 数据</li>
            </ul>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="clearAll()">
                🧹 一键清理所有缓存
            </button>
            <button class="btn-secondary" onclick="clearLocalStorage()">
                📦 仅清理 Local Storage
            </button>
            <button class="btn-secondary" onclick="clearCookies()">
                🍪 仅清理 Cookies
            </button>
        </div>
        
        <div class="links">
            <a href="http://localhost:3000/super-admin/test-simple" class="link-btn" target="_blank">
                🧪 测试认证
            </a>
            <a href="http://localhost:3000/super-admin/login" class="link-btn" target="_blank">
                🔐 前往登录
            </a>
        </div>
        
        <div class="warning">
            <div class="warning-text">
                ⚠️ <strong>注意：</strong>清理缓存后，您需要重新登录所有网站。建议先保存重要的工作。
            </div>
        </div>
    </div>
    
    <script>
        function updateStatus(message, success = false) {
            const status = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            
            statusText.textContent = message;
            
            if (success) {
                status.classList.add('success');
            } else {
                status.classList.remove('success');
            }
        }
        
        function clearLocalStorage() {
            try {
                localStorage.clear();
                updateStatus('✅ Local Storage 已清理！', true);
                console.log('✅ Local Storage cleared');
            } catch (error) {
                updateStatus('❌ 清理失败: ' + error.message, false);
                console.error('Error clearing localStorage:', error);
            }
        }
        
        function clearSessionStorage() {
            try {
                sessionStorage.clear();
                console.log('✅ Session Storage cleared');
            } catch (error) {
                console.error('Error clearing sessionStorage:', error);
            }
        }
        
        function clearCookies() {
            try {
                const cookies = document.cookie.split(";");
                
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i];
                    const eqPos = cookie.indexOf("=");
                    const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                    document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
                }
                
                updateStatus('✅ Cookies 已清理！', true);
                console.log('✅ Cookies cleared');
            } catch (error) {
                updateStatus('❌ 清理失败: ' + error.message, false);
                console.error('Error clearing cookies:', error);
            }
        }
        
        async function clearIndexedDB() {
            try {
                const databases = await indexedDB.databases();
                for (const db of databases) {
                    if (db.name) {
                        indexedDB.deleteDatabase(db.name);
                        console.log('✅ Deleted IndexedDB:', db.name);
                    }
                }
            } catch (error) {
                console.error('Error clearing IndexedDB:', error);
            }
        }
        
        async function clearAll() {
            updateStatus('🔄 正在清理...', false);
            
            try {
                // Clear all storage
                clearLocalStorage();
                clearSessionStorage();
                clearCookies();
                await clearIndexedDB();
                
                // Wait a bit for everything to clear
                await new Promise(resolve => setTimeout(resolve, 500));
                
                updateStatus('✅ 所有缓存已清理！请刷新页面或重新登录。', true);
                
                // Optional: Auto reload after 2 seconds
                setTimeout(() => {
                    if (confirm('缓存已清理！是否立即前往登录页面？')) {
                        window.location.href = 'http://localhost:3000/super-admin/login';
                    }
                }, 2000);
                
            } catch (error) {
                updateStatus('❌ 清理过程中出现错误: ' + error.message, false);
                console.error('Error during cleanup:', error);
            }
        }
        
        // Log current storage state on load
        console.log('=== 当前存储状态 ===');
        console.log('Local Storage keys:', Object.keys(localStorage));
        console.log('Session Storage keys:', Object.keys(sessionStorage));
        console.log('Cookies:', document.cookie);
    </script>
</body>
</html>
